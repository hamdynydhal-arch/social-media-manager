    <!-- Capture beforeinstallprompt BEFORE React boots so we never miss it -->
    <script>
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.deferredPrompt = e;
        document.dispatchEvent(new Event('pwa-prompt-ready'));
      });
    </script>
