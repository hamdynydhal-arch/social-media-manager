[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command   = "npm install --legacy-peer-deps && npm run build"
  publish   = "dist"

[build.environment]
  VITE_BASE_URL = "/"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"
