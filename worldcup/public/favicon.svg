<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="68%">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </radialGradient>
    <linearGradient id="gld" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="42%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
    <linearGradient id="gldH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="url(#bg)"/>

  <!-- Stars (3 small 5-pointed) -->
  <polygon fill="#fbbf24" transform="translate(35,13)"
    points="0,-5 1.12,-1.55 4.76,-1.55 1.82,0.59 2.94,4.05 0,1.91 -2.94,4.05 -1.82,0.59 -4.76,-1.55 -1.12,-1.55"/>
  <polygon fill="#fbbf24" transform="translate(50,11)"
    points="0,-6 1.35,-1.86 5.71,-1.86 2.18,0.71 3.53,4.85 0,2.29 -3.53,4.85 -2.18,0.71 -5.71,-1.86 -1.35,-1.86"/>
  <polygon fill="#fbbf24" transform="translate(65,13)"
    points="0,-5 1.12,-1.55 4.76,-1.55 1.82,0.59 2.94,4.05 0,1.91 -2.94,4.05 -1.82,0.59 -4.76,-1.55 -1.12,-1.55"/>

  <!-- Trophy handles (behind cup) -->
  <path d="M 36,26 Q 22,28 22,39 Q 22,50 36,53"
    fill="none" stroke="url(#gldH)" stroke-width="5.5" stroke-linecap="round"/>
  <path d="M 64,26 Q 78,28 78,39 Q 78,50 64,53"
    fill="none" stroke="url(#gldH)" stroke-width="5.5" stroke-linecap="round"/>

  <!-- Trophy cup body -->
  <path d="M 35,22 L 65,22 L 61,55 Q 58,62 50,62 Q 42,62 39,55 Z" fill="url(#gld)"/>
  <path d="M 39,22 L 61,22 L 57,53 Q 54,59 50,59 Q 46,59 43,53 Z" fill="#7c2d12" opacity="0.22"/>
  <rect x="33" y="19" width="34" height="5" rx="2" fill="url(#gld)"/>

  <!-- Trophy stem + base -->
  <rect x="46" y="62" width="8" height="10" rx="1" fill="url(#gld)"/>
  <rect x="37" y="72" width="26" height="5" rx="2" fill="url(#gld)"/>
  <rect x="35" y="77" width="30" height="4" rx="2" fill="url(#gld)"/>

  <!-- Football on cup -->
  <circle cx="50" cy="40" r="12" fill="white"/>
  <polygon fill="#0f172a" points="50,33.5 53.4,36 52.2,40 47.8,40 46.6,36"/>
  <circle cx="50" cy="28.5" r="2" fill="#0f172a"/>
  <circle cx="59.5" cy="37" r="2" fill="#0f172a"/>
  <circle cx="56.2" cy="47.5" r="2" fill="#0f172a"/>
  <circle cx="43.8" cy="47.5" r="2" fill="#0f172a"/>
  <circle cx="40.5" cy="37" r="2" fill="#0f172a"/>
  <line x1="50" y1="33.5" x2="50" y2="30.5" stroke="#0f172a" stroke-width="0.9"/>
  <line x1="53.4" y1="36" x2="57.5" y2="37.7" stroke="#0f172a" stroke-width="0.9"/>
  <line x1="52.2" y1="40" x2="54.8" y2="45.5" stroke="#0f172a" stroke-width="0.9"/>
  <line x1="47.8" y1="40" x2="45.2" y2="45.5" stroke="#0f172a" stroke-width="0.9"/>
  <line x1="46.6" y1="36" x2="42.5" y2="37.7" stroke="#0f172a" stroke-width="0.9"/>
  <circle cx="50" cy="40" r="12" fill="none" stroke="#cbd5e1" stroke-width="0.8"/>
</svg>
