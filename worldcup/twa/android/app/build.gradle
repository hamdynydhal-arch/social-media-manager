plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hamdynydhal.worldcup2026'
    compileSdk 34

    defaultConfig {
        applicationId "com.hamdynydhal.worldcup2026"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        release {
            storeFile file("worldcup.keystore")
            storePassword "worldcup2026"
            keyAlias "worldcup"
            keyPassword "worldcup2026"
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
