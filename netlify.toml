[build]
  base      = "worldcup"
  command   = "npm install --legacy-peer-deps && npm run build"
  publish   = "dist"

[build.environment]
  VITE_BASE_URL = "/"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control          = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
