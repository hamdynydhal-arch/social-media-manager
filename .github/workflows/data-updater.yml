name: تحديث بيانات كأس العالم

on:
  schedule:
    - cron: '0 */6 * * *'   # كل 6 ساعات: 00:00 · 06:00 · 12:00 · 18:00 UTC
  workflow_dispatch:         # تشغيل يدوي عند الحاجة

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: استدعاء الكود
        uses: actions/checkout@v4
        with:
          ref: claude/world-cup-pwa-app-jfg1rv
          token: ${{ secrets.WORLDCUP_DEPLOY_TOKEN }}

      - name: إعداد Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: تشغيل سكربت الجلب والترجمة
        run: node worldcup/scripts/update-data.mjs

      - name: حفظ التحديثات ورفعها
        run: |
          git config user.name  "wc-data-bot"
          git config user.email "wc-data-bot@users.noreply.github.com"

          if git diff --quiet worldcup/src/data/data.json; then
            echo "✅ لا تغييرات — البيانات محدّثة"
          else
            SUMMARY=$(git diff --stat worldcup/src/data/data.json)
            git add worldcup/src/data/data.json
            git commit -m "chore(data): تحديث تلقائي $(date -u '+%Y-%m-%d %H:%M') UTC

${SUMMARY}"
            git push origin claude/world-cup-pwa-app-jfg1rv
            echo "🚀 تم الرفع — سيبدأ إعادة بناء الموقع تلقائياً عبر deploy-worldcup.yml"
          fi
