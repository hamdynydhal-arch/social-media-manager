name: Add psy.prtnh.com domain to Vercel

on:
  workflow_dispatch:

jobs:
  add-domain:
    runs-on: ubuntu-latest
    steps:
      - name: Add domain via Vercel API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROJECT_ID="prj_6UDvT5b4HaS33l6OtR0zSeE0bb9g"
          DOMAIN="psy.prtnh.com"

          RESPONSE=$(curl -s -X POST \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}/domains" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"name\": \"${DOMAIN}\"}"
          )

          echo "API Response: $RESPONSE"

          ERROR=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('error',{}).get('message',''))" 2>/dev/null || echo '')

          if [ -n "$ERROR" ] && [ "$ERROR" != "None" ] && [ "$ERROR" != "" ]; then
            echo "::error::Domain add failed: $ERROR"
            exit 1
          fi

          echo "Domain added successfully!"
          echo "### Domain binding result" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$RESPONSE" | python3 -m json.tool >> $GITHUB_STEP_SUMMARY || echo "$RESPONSE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

      - name: Verify domain status
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          PROJECT_ID="prj_6UDvT5b4HaS33l6OtR0zSeE0bb9g"
          DOMAIN="psy.prtnh.com"

          STATUS=$(curl -s \
            "https://api.vercel.com/v9/projects/${PROJECT_ID}/domains/${DOMAIN}" \
            -H "Authorization: Bearer ${VERCEL_TOKEN}")

          echo "Domain status: $STATUS"
          echo "### Domain verification" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
          echo "$STATUS" | python3 -m json.tool >> $GITHUB_STEP_SUMMARY || echo "$STATUS" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
