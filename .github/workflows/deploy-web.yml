name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/vigilant-franklin-v2DyI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write
  administration: write

defaults:
  run:
    working-directory: ./app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build static web export
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # Disable Jekyll so GitHub Pages serves _expo/ asset folders correctly
      - name: Add .nojekyll
        run: touch dist/.nojekyll

      # Copy index.html → 404.html so GitHub Pages redirects all unknown paths
      # back to the SPA, letting Expo Router handle client-side navigation
      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - name: Make repository public
        run: |
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hamdynydhal-arch/social-media-manager \
            -d '{"private":false}'
        working-directory: .

      - name: Enable GitHub Pages
        run: |
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hamdynydhal-arch/social-media-manager/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}' || \
          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hamdynydhal-arch/social-media-manager/pages \
            -d '{"source":{"branch":"gh-pages","path":"/"}}'
        working-directory: .

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
