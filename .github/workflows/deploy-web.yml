name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/vigilant-franklin-v2DyI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    working-directory: ./app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build static web export
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Add CNAME for custom domain
        run: echo "smm.prtnh.com" > dist/CNAME

      - name: Copy PWA icons (manifest references /assets/icon.png — must exist)
        run: |
          mkdir -p dist/assets
          cp assets/icon.png dist/assets/icon.png

      - name: Generate service worker
        run: |
          cat > dist/sw.js << 'SWEOF'
          const CACHE_NAME = 'smm-cache-v1';
          const PRECACHE = ['/'];

          self.addEventListener('install', event => {
            self.skipWaiting();
            event.waitUntil(
              caches.open(CACHE_NAME).then(cache => cache.addAll(PRECACHE))
            );
          });

          self.addEventListener('activate', event => {
            event.waitUntil(
              caches.keys().then(keys =>
                Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
              ).then(() => self.clients.claim())
            );
          });

          self.addEventListener('fetch', event => {
            if (event.request.method !== 'GET') return;
            event.respondWith(
              fetch(event.request)
                .then(response => {
                  const clone = response.clone();
                  caches.open(CACHE_NAME).then(cache => cache.put(event.request, clone));
                  return response;
                })
                .catch(() => caches.match(event.request))
            );
          });
          SWEOF

      - name: Inject HTTPS redirect, PWA meta tags, and SW registration into HTML
        run: |
          REDIRECT='<script>if(location.protocol!=="https:"&&location.hostname!=="localhost"){location.replace("https://"+location.host+location.pathname+location.search+location.hash);}</script>'
          SW_REG='<script>if("serviceWorker"in navigator){navigator.serviceWorker.register("/sw.js").then(function(r){console.log("SW registered",r.scope);}).catch(function(e){console.error("SW error",e);});}</script>'
          PWA_CAPTURE='<script>window.deferredPrompt=null;window.__pwaPrompt=null;window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();window.deferredPrompt=e;window.__pwaPrompt=e;console.log("[PWA] beforeinstallprompt captured");});</script>'
          VIEWPORT='<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">'
          PWA_META='<meta name="mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="المحتوى"><meta name="theme-color" content="#06B6D4"><link rel="apple-touch-icon" href="/assets/icon.png"><link rel="manifest" href="/manifest.json">'
          sed -i "s|</head>|${VIEWPORT}${PWA_META}${SW_REG}${PWA_CAPTURE}${REDIRECT}</head>|" dist/index.html

      - name: Generate manifest.json
        run: |
          cat > dist/manifest.json << 'EOF'
          {
            "name": "منصة المحتوى",
            "short_name": "المحتوى",
            "description": "أدِر جميع حساباتك على وسائل التواصل من مكان واحد",
            "start_url": "/",
            "scope": "/",
            "display": "standalone",
            "orientation": "portrait",
            "background_color": "#0C0820",
            "theme_color": "#06B6D4",
            "lang": "ar",
            "dir": "rtl",
            "categories": ["productivity", "social"],
            "icons": [
              { "src": "/assets/icon.png", "sizes": "192x192", "type": "image/png", "purpose": "any" },
              { "src": "/assets/icon.png", "sizes": "512x512", "type": "image/png", "purpose": "maskable" }
            ]
          }
          EOF

      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # Carry the World Cup PWA into this deploy so force_orphan never deletes it
      - name: Preserve World Cup PWA
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout origin/gh-pages -- world-cup 2>/dev/null \
            && mv world-cup ./app/dist/ \
            || echo "world-cup not on gh-pages yet — skipping"
        working-directory: .

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"

      - name: Configure GitHub Pages custom domain and enforce HTTPS
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Set custom domain via gh CLI (handles auth correctly)
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /repos/hamdynydhal-arch/social-media-manager/pages \
            -f cname="smm.prtnh.com" \
            -F https_enforced=true \
            --jq '"Domain: \(.cname) | HTTPS enforced: \(.https_enforced)"' \
            || echo "Pages API update attempted"

          # Poll until SSL is approved (max 3 min)
          for i in $(seq 1 18); do
            sleep 10
            STATUS=$(gh api /repos/hamdynydhal-arch/social-media-manager/pages \
              --jq '.https_certificate.state' 2>/dev/null || echo "unknown")
            echo "SSL state ($i/18): $STATUS"
            [ "$STATUS" = "approved" ] && { echo "SSL active!"; break; }
          done
        working-directory: .
