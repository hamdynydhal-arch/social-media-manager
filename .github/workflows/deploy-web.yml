name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/vigilant-franklin-v2DyI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./app/package-lock.json

      - name: Install dependencies
        working-directory: ./app
        # --legacy-peer-deps bypasses React 19 / React 18 peer-dep conflicts
        run: npm install --legacy-peer-deps

      - name: Build static web export
        working-directory: ./app
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      # Without .nojekyll, GitHub Pages (Jekyll) strips _expo/ and breaks all JS
      - name: Disable Jekyll processing
        run: touch ./app/dist/.nojekyll

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"
