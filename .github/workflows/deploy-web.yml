name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/vigilant-franklin-v2DyI
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pages: write
  id-token: write

defaults:
  run:
    working-directory: ./app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build static web export
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - name: Add 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      # Carry the World Cup PWA into this deploy so force_orphan never deletes it
      - name: Preserve World Cup PWA
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          git checkout origin/gh-pages -- world-cup 2>/dev/null \
            && mv world-cup ./app/dist/ \
            || echo "world-cup not on gh-pages yet — skipping"
        working-directory: .

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./app/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "deploy: ${{ github.sha }}"

      - name: Enable GitHub Pages (legacy branch source)
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/hamdynydhal-arch/social-media-manager/pages \
            -d '{"build_type":"legacy","source":{"branch":"gh-pages","path":"/"}}')
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY (HTTP $HTTP_CODE)"
          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "409" ]; then
            echo "Pages enabled or already exists."
          else
            echo "POST failed ($HTTP_CODE), trying PUT to update..."
            curl -s -X PUT \
              -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/hamdynydhal-arch/social-media-manager/pages \
              -d '{"source":{"branch":"gh-pages","path":"/"}}'
          fi
        working-directory: .
