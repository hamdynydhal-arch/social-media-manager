name: Deploy psy.prtnh.com to Vercel

on:
  push:
    branches: [main, claude/session-description-unavailable-ta2oqf]
    paths: ['psy/**']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      PROJECT_ID: prj_6UDvT5b4HaS33l6OtR0zSeE0bb9g

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: psy/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Install psy dependencies
        working-directory: psy
        run: npm ci

      - name: Get Vercel org ID, set rootDirectory, link project
        run: |
          ORG_ID=$(curl -sf \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user" | jq -r '.user.id')
          echo "ORG_ID=$ORG_ID" >> $GITHUB_ENV

          # Ensure Vercel project has rootDirectory=psy so it finds dist/ correctly
          curl -s -X PATCH \
            "https://api.vercel.com/v9/projects/$PROJECT_ID" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"rootDirectory":"psy","framework":"vite"}' > /dev/null

          # Write link file at REPO ROOT so vercel CLI resolves rootDirectory correctly
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$ORG_ID" "$PROJECT_ID" > .vercel/project.json
          echo "Linked to org=$ORG_ID project=$PROJECT_ID"

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build psy app via Vercel CLI (from repo root, rootDirectory=psy)
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy prebuilt output to Vercel
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
          echo "Deployed: $DEPLOY_URL"

      - name: Ensure domain psy.prtnh.com is bound
        run: |
          RESULT=$(curl -s -X POST \
            "https://api.vercel.com/v9/projects/$PROJECT_ID/domains" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"name":"psy.prtnh.com"}' | jq -r '.name // .error.message')
          echo "Domain: $RESULT"

      - name: Summary
        run: |
          echo "### psy.prtnh.com Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- Vercel URL: $DEPLOY_URL" >> $GITHUB_STEP_SUMMARY
          echo "- Custom domain: https://psy.prtnh.com" >> $GITHUB_STEP_SUMMARY
