name: Deploy World Cup PWA

on:
  push:
    branches: [claude/world-cup-pwa-app-jfg1rv]
    paths:
      - 'worldcup/**'
      - '.github/workflows/deploy-worldcup.yml'
  workflow_dispatch:
  # Re-run automatically whenever the Expo deploy overwrites gh-pages
  workflow_run:
    workflows: ["Deploy to GitHub Pages"]
    types: [completed]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worldcup/package-lock.json

      - name: Install dependencies
        working-directory: worldcup
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: worldcup
        run: npm run build

      - name: Prepare deployment structure
        run: |
          mkdir -p worldcup/site/wc26
          mkdir -p worldcup/site/.well-known

          # Empty root page (prtnh.com root stays blank)
          cat > worldcup/site/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="ar">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <title>prtnh.com</title>
            <style>html,body{margin:0;padding:0;background:#000;height:100%;}</style>
          </head>
          <body></body>
          </html>
          HTMLEOF

          # Asset links at root for Android TWA verification
          cp worldcup/public/.well-known/assetlinks.json worldcup/site/.well-known/assetlinks.json

          # CNAME so GitHub Pages serves via prtnh.com
          echo "prtnh.com" > worldcup/site/CNAME

          # World Cup app in /wc26/
          cp -r worldcup/dist/. worldcup/site/wc26/

      - name: Deploy to gh-pages (prtnh.com root + /wc26/)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: worldcup/site
          keep_files: true
          commit_message: 'Deploy: empty root + World Cup app at /wc26/ [skip ci]'
