name: Deploy World Cup PWA

on:
  push:
    branches: [claude/world-cup-pwa-app-jfg1rv]
    paths:
      - 'worldcup/**'
      - '.github/workflows/deploy-worldcup.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/world-cup-pwa-app-jfg1rv

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worldcup/package-lock.json

      - name: Install dependencies
        working-directory: worldcup
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: worldcup
        run: npm run build
        env:
          VITE_BASE_URL: /

      - name: Deploy to hamdynydhal-arch/worldcup-2026 gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.WORLDCUP_DEPLOY_TOKEN }}
          external_repository: hamdynydhal-arch/worldcup-2026
          publish_dir: worldcup/dist
          publish_branch: gh-pages
          force_orphan: true
          cname: wc26.prtnh.com
          commit_message: 'Deploy World Cup PWA to wc26.prtnh.com [skip ci]'
