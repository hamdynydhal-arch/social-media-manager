name: Deploy World Cup PWA

on:
  push:
    branches: [claude/world-cup-pwa-app-jfg1rv]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Auto-enable GitHub Pages via API
        continue-on-error: true
        run: |
          HTTP=$(curl -s -o /tmp/pr.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/pages" \
            -d '{"build_type":"workflow"}')
          echo "POST Pages API => $HTTP"
          cat /tmp/pr.json
          if [ "$HTTP" = "409" ] || [ "$HTTP" = "422" ]; then
            curl -s -X PUT \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/pages" \
              -d '{"build_type":"workflow"}' || true
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: cd worldcup && npm install --legacy-peer-deps

      - name: Build
        run: cd worldcup && npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: worldcup/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
