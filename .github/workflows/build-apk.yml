name: Build World Cup APK

on:
  push:
    branches: [claude/world-cup-pwa-app-jfg1rv]
    paths:
      - 'worldcup/twa/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Copy keystore into app directory
        run: cp worldcup/twa/worldcup.keystore worldcup/twa/android/app/worldcup.keystore

      - name: Build Release APK
        working-directory: worldcup/twa/android
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: gradle assembleRelease

      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: كأس العالم 2026 — APK أندرويد
          body: |
            ## تحميل تطبيق كأس العالم 2026 على الأندرويد

            ### خطوات التثبيت:
            1. حمّل ملف `app-release.apk`
            2. افتح إعدادات الهاتف ← الأمان ← فعّل "مصادر غير معروفة"
            3. افتح ملف APK وثبّت التطبيق
            4. استمتع بالتنبيهات الفورية للأهداف والمباريات! ⚽

            ---
            🔴 يتطلب أندرويد 5.0 أو أحدث
          files: worldcup/twa/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
