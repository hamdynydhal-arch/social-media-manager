name: Enforce HTTPS on worldcup-2026 Pages

on:
  workflow_dispatch:

jobs:
  enforce-https:
    runs-on: ubuntu-latest
    steps:
      - name: Check current Pages & certificate status
        id: check
        run: |
          RESPONSE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.WORLDCUP_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hamdynydhal-arch/worldcup-2026/pages)
          echo "$RESPONSE" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('custom_domain:', d.get('custom_domain'))
          print('https_enforced:', d.get('https_enforced'))
          cert = d.get('https_certificate', {})
          print('cert_state:', cert.get('state'))
          print('cert_description:', cert.get('description'))
          "

      - name: Poll until SSL certificate is approved, then enforce HTTPS
        run: |
          MAX=20
          for i in $(seq 1 $MAX); do
            CERT_STATE=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.WORLDCUP_DEPLOY_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/hamdynydhal-arch/worldcup-2026/pages | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('https_certificate',{}).get('state','unknown'))")

            echo "Attempt $i/$MAX — certificate state: $CERT_STATE"

            if [ "$CERT_STATE" = "approved" ] || [ "$CERT_STATE" = "issued" ]; then
              echo "Certificate ready. Enforcing HTTPS..."
              RESULT=$(curl -s -w "\nHTTP_CODE:%{http_code}" \
                -X PUT \
                -H "Authorization: Bearer ${{ secrets.WORLDCUP_DEPLOY_TOKEN }}" \
                -H "Accept: application/vnd.github+json" \
                -H "Content-Type: application/json" \
                -d '{"https_enforced": true}' \
                https://api.github.com/repos/hamdynydhal-arch/worldcup-2026/pages)
              echo "$RESULT"
              HTTP_CODE=$(echo "$RESULT" | grep "HTTP_CODE:" | cut -d: -f2)
              if [ "$HTTP_CODE" = "204" ]; then
                echo "SUCCESS: HTTPS enforced on wc26.prtnh.com"
              else
                echo "ERROR: Unexpected response code $HTTP_CODE"
                exit 1
              fi
              break
            fi

            if [ $i -eq $MAX ]; then
              echo "TIMEOUT: Certificate not ready after $((MAX * 30)) seconds"
              exit 1
            fi

            echo "Waiting 30 seconds..."
            sleep 30
          done

      - name: Verify final Pages state
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.WORLDCUP_DEPLOY_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/hamdynydhal-arch/worldcup-2026/pages | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('=== Final Pages State ===')
          print('custom_domain :', d.get('custom_domain'))
          print('https_enforced:', d.get('https_enforced'))
          cert = d.get('https_certificate', {})
          print('cert_state    :', cert.get('state'))
          print('url           :', d.get('html_url'))
          "
